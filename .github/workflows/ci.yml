name: AgentPort CI

on:
  push:
    branches: [main, "agent/**"]
  pull_request:

jobs:
  lockfile-preview:
    name: Generate patched lock files
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/refactor-dual-end-architecture
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund
      - run: npm --prefix server install --package-lock-only --ignore-scripts --no-audit --no-fund
      - uses: actions/upload-artifact@v4
        with:
          name: refreshed-lockfiles
          path: |
            package-lock.json
            server/package-lock.json
          if-no-files-found: error
      - name: Commit generated lock files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json server/package-lock.json
          if git diff --cached --quiet; then
            echo "Lock files are current"
            exit 0
          fi
          git commit -m "chore: refresh patched dependency locks"
          git push origin HEAD:agent/refactor-dual-end-architecture

  architecture:
    name: Architecture (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: node test-architecture.cjs
      - run: node test-daemon-gateway.cjs
      - run: node test-exec-core.cjs
      - run: node test-client-runtime.cjs
      - run: node test-client-development-sessions.cjs
      - run: node test-development-session-service.cjs
      - run: node test-development-gateway.cjs
      - run: node test-client-redaction.cjs

  durable-linux:
    name: Legacy, durable jobs, Worktrees, and MCP V3 (Ubuntu, Node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:lifecycle
      - run: node test-job-service.cjs
      - run: node test-job-worker-readiness.cjs
      - run: node test-daemon-exec-jobs.cjs
      - run: node test-development-session-service.cjs
      - run: node test-development-gateway.cjs
      - run: node test-client-mcp-v3.cjs
      - run: node test-mcp-redaction.cjs
      - run: npm audit --audit-level=high
      - run: npm --prefix server audit --audit-level=high
