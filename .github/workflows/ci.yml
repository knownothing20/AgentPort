name: AgentPort CI

on:
  push:
    branches: [main, "agent/**"]
  pull_request:

jobs:
  architecture:
    name: Architecture (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run test:architecture
      - if: runner.os == 'Linux'
        run: npm run test:lifecycle
