name: AgentPort CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: agentport-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  architecture:
    name: Architecture (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: node test-architecture.cjs
      - run: node test-daemon-gateway.cjs
      - run: node test-exec-core.cjs
      - run: node test-client-runtime.cjs
      - run: node test-client-development-sessions.cjs
      - run: node test-project-lock.cjs
      - run: node test-development-session-service.cjs
      - run: node test-development-gateway.cjs
      - run: node test-client-redaction.cjs
      - run: node test-daemon-response-redaction.cjs

  windows-jobs:
    name: Job Service (windows-latest, Node ${{ matrix.node }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: node test-job-service.cjs
      - run: node test-daemon-exec-jobs.cjs
      - run: node test-daemon-exec-jobs.cjs

  durable-linux:
    name: Legacy, durable jobs, Worktrees, and MCP V3 (Ubuntu, Node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:lifecycle
      - run: node test-job-service.cjs
      - run: node test-job-worker-readiness.cjs
      - run: node test-daemon-exec-jobs.cjs
      - run: node test-project-lock.cjs
      - run: node test-development-session-service.cjs
      - run: node test-development-gateway.cjs
      - run: node test-client-mcp-v3.cjs
      - run: node test-mcp-redaction.cjs
      - run: node test-daemon-response-redaction.cjs
      - run: npm audit --audit-level=moderate
      - name: Clean-install and verify legacy daemon dependencies
        run: |
          npm --prefix server ci --ignore-scripts --no-audit --no-fund
          node -e "const v=require('./server/node_modules/qs/package.json').version;if(v!=='6.15.3')throw new Error('Expected qs 6.15.3, got '+v)"
      - run: npm --prefix server audit --audit-level=moderate

  repair-changelog-once:
    name: Repair Changelog Scope Once
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/refactor-dual-end-architecture
          fetch-depth: 0
      - name: Restore main history and prepend 3.1.0
        run: |
          git fetch origin main
          python - <<'PY'
          from pathlib import Path
          import subprocess

          base = subprocess.check_output(
              ["git", "show", "origin/main:CHANGELOG.md"],
              text=True,
              encoding="utf-8",
          )
          marker = "# Changelog\n\n"
          if not base.startswith(marker):
              raise SystemExit("Unexpected main CHANGELOG header")

          section = """## [3.1.0] - 2026-07-18 | Dual-end daemon, durable Jobs, and Worktree Sessions

### Added
- Added the modular V3 file, execution, persistent Job, connection-registry, and Git Worktree Session architecture while retaining compatibility entrypoints.
- Added owner/admin authorization boundaries for Session and Job resources, client-scoped idempotency, and adversarial two-client tests.
- Added bounded line-range reads with explicit output and scan limits, metadata cache ETags, and no unbounded full-file hashing.
- Added atomic owner-aware project locks that cannot expire while the owning operation is alive.

### Fixed
- Fixed zero-delay Job completion, Worker readiness diagnostics, process-tree cancellation, Windows 8.3 path handling, and temporary-directory cleanup races.
- Fixed Session subprocess output races by waiting for stdout/stderr close before returning Git results.
- Fixed server lockfile reproducibility and patched dependency audit findings.
- Unified credential and command-response redaction across CLI, MCP, Runtime, Job, Session, and public daemon responses.

### Validated
- Passed Windows and Ubuntu Node.js 20/22 CI, clean server installation, moderate-level audits, repeated Windows Job cleanup tests, atomic-lock 1000-round contention tests, and physical Windows + Debian gray validation.

---

"""
          Path("CHANGELOG.md").write_text(
              marker + section + base[len(marker):],
              encoding="utf-8",
              newline="\n",
          )

          ci_path = Path(".github/workflows/ci.yml")
          ci = ci_path.read_text(encoding="utf-8")
          marker_job = "\n  repair-changelog-once:\n"
          if marker_job not in ci:
              raise SystemExit("Repair job marker missing")
          ci_path.write_text(ci.split(marker_job, 1)[0].rstrip() + "\n", encoding="utf-8", newline="\n")
          PY
          git rm -f .github/workflows/repair-changelog-once.yml
          git diff --check
          python - <<'PY'
          from pathlib import Path
          text = Path("CHANGELOG.md").read_text(encoding="utf-8")
          assert text.count("## [3.1.0]") == 1
          assert "## [2026-05-18] feat | Stable development gateway jobs" in text
          assert "Added dashboard diagnostics panel `断链诊断摘要`" in text
          assert "## [1.0.0] - 2026-03" in text
          PY
      - name: Commit repaired scope
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md .github/workflows/ci.yml
          git commit -m "docs: restore changelog history and add 3.1.0"
          git push origin HEAD:agent/refactor-dual-end-architecture
