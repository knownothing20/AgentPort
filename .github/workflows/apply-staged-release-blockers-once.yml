name: Apply staged release blocker fixes once

on:
  push:
    branches: ["agent/refactor-dual-end-architecture"]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/refactor-dual-end-architecture
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply staged source changes
        run: |
          echo "Applying verified release-blocker fixes"
          node scripts/release-blocker-part1.cjs
          node scripts/release-blocker-part2.cjs
          node scripts/release-blocker-part3.cjs
          node scripts/release-blocker-part4.cjs
      - name: Validate syntax
        run: |
          node --check packages/daemon-core/file-read-service.cjs
          node --check packages/daemon-core/project-lock.cjs
          node --check packages/daemon-core/development-session-service.cjs
          node --check daemon/auth-context.cjs
          node --check daemon/modular-gateway.cjs
          node --check daemon/development-gateway.cjs
          node --check test-daemon-gateway.cjs
          node --check test-project-lock.cjs
          node --check test-development-gateway.cjs
          node --check test-daemon-exec-jobs.cjs
      - name: Run release-blocker regression tests
        run: |
          node test-daemon-gateway.cjs
          node test-project-lock.cjs
          node test-development-session-service.cjs
          node test-development-gateway.cjs
          node test-daemon-exec-jobs.cjs
      - name: Commit verified fixes and remove staging files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-staged-release-blockers-once.yml
          git rm scripts/release-blocker-part1.cjs scripts/release-blocker-part2.cjs scripts/release-blocker-part3.cjs scripts/release-blocker-part4.cjs
          git add packages/daemon-core/file-read-service.cjs packages/daemon-core/project-lock.cjs packages/daemon-core/development-session-service.cjs daemon/auth-context.cjs daemon/modular-gateway.cjs daemon/development-gateway.cjs daemon/.env.example test-daemon-gateway.cjs test-project-lock.cjs test-development-session-service.cjs test-development-gateway.cjs test-daemon-exec-jobs.cjs package.json .github/workflows/ci.yml docs/PHASE5_DEVELOPMENT_SESSIONS.md CHANGELOG.md
          git commit -m "fix: bound resources and enforce client ownership"
          git push origin HEAD:agent/refactor-dual-end-architecture
