name: Apply release blocker fixes once

on:
  push:
    branches: ["agent/refactor-dual-end-architecture"]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/refactor-dual-end-architecture
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Patch gateways, locks, tests, and docs
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          function read(file) { return fs.readFileSync(file, 'utf8'); }
          function write(file, value) { fs.writeFileSync(file, value); }
          function replaceOnce(source, before, after, label) {
            const count = source.split(before).length - 1;
            if (count !== 1) throw new Error(`${label}: expected one match, got ${count}`);
            return source.replace(before, after);
          }

          // Project lock integration.
          {
            const file = 'packages/daemon-core/project-lock.cjs';
            let source = read(file);
            source = source.replace('lockLeaseMs, 5 * 60_000, 30_000, 60 * 60_000', 'lockLeaseMs, 5 * 60_000, 1000, 60 * 60_000');
            write(file, source);
          }
          {
            const file = 'packages/daemon-core/development-session-service.cjs';
            let source = read(file);
            source = replaceOnce(
              source,
              "const { pidAlive, terminateProcessTree } = require('./process-utils.cjs');",
              "const { pidAlive, terminateProcessTree } = require('./process-utils.cjs');\nconst { createProjectLockManager } = require('./project-lock.cjs');",
              'session lock import',
            );
            source = replaceOnce(source, "function hash(value) { return crypto.createHash('sha256').update(String(value)).digest('hex'); }\n", '', 'remove old lock hash');
            source = replaceOnce(
              source,
              "  lockTimeoutMs = 15_000,\n  gitTimeoutMs = 60_000,",
              "  lockTimeoutMs = 15_000,\n  projectLockLeaseMs = 5 * 60_000,\n  gitTimeoutMs = 60_000,",
              'session lock options',
            );
            const oldLock = `  async function withProjectLock(projectRoot, fn) {\n    await init();\n    const lockPath = path.join(locksDir, \`${'${hash(path.resolve(projectRoot)).slice(0, 24)}'}.lock\`);\n    const deadline = Date.now() + lockTimeoutMs;\n    let handle = null;\n    while (!handle) {\n      try {\n        handle = await fs.open(lockPath, 'wx', 0o600);\n        await handle.writeFile(JSON.stringify({ pid: process.pid, projectRoot: path.resolve(projectRoot), acquiredAt: nowIso(), expiresAt: new Date(Date.now() + Math.max(lockTimeoutMs * 2, 30_000)).toISOString() }));\n      } catch (error) {\n        if (error?.code !== 'EEXIST') throw error;\n        let stale = false;\n        try {\n          const info = JSON.parse(await fs.readFile(lockPath, 'utf8'));\n          stale = Date.parse(info.expiresAt || 0) < Date.now() || (info.pid && !pidAlive(info.pid));\n        } catch { stale = true; }\n        if (stale) { await fs.rm(lockPath, { force: true }); continue; }\n        if (Date.now() >= deadline) throw errorWith('Project operation lock timed out', 'EPROJECT_LOCKED', 423, { projectRoot });\n        await sleep(100);\n      }\n    }\n    try { return await fn(); }\n    finally { try { await handle.close(); } catch {} await fs.rm(lockPath, { force: true }); }\n  }`;
            const newLock = `  const projectLocks = createProjectLockManager({ locksDir, lockTimeoutMs, lockLeaseMs: projectLockLeaseMs });\n  async function withProjectLock(projectRoot, fn) {\n    await init();\n    return projectLocks.withLock(projectRoot, fn);\n  }`;
            source = replaceOnce(source, oldLock, newLock, 'replace project lock');
            source = replaceOnce(
              source,
              "leaseActive: sessions.filter((item) => item.leaseActive).length, sessionsDir: sessionRoot, worktreesDir: worktreeRoot }",
              "leaseActive: sessions.filter((item) => item.leaseActive).length, sessionsDir: sessionRoot, worktreesDir: worktreeRoot, projectLockLeaseMs: projectLocks.leaseMs }",
              'session stats lock lease',
            );
            write(file, source);
          }

          // Modular gateway authorization and Job ownership.
          {
            const file = 'daemon/modular-gateway.cjs';
            let source = read(file);
            source = replaceOnce(
              source,
              'const { startLegacyProcess } = require("./legacy-process.cjs");',
              'const { startLegacyProcess } = require("./legacy-process.cjs");\nconst {\n  assertResourceOwner,\n  authorizeContext,\n  extractToken: extractAuthToken,\n  filterOwnedResources,\n  requestedClientId: requestedAuthClientId,\n  scopeIdempotencyKey,\n} = require("./auth-context.cjs");',
              'modular auth import',
            );
            const oldAuth = `function extractToken(req, url) {\n  if (url.searchParams.get("token")) return url.searchParams.get("token");\n  const authorization = req.headers.authorization;\n  const alternate = req.headers["x-mcp-token"] || req.headers["x-niuma-token"];\n  const raw = (typeof authorization === "string" && authorization.trim())\n    || (typeof alternate === "string" && alternate.trim())\n    || "";\n  return raw.startsWith("Bearer ") ? raw.slice(7).trim() : raw;\n}\n\nfunction requestedClientId(req) {\n  const value = req.headers["x-mcp-client-id"] || req.headers["x-niuma-client-id"] || req.headers["x-client-id"];\n  return typeof value === "string" ? value.trim() : "";\n}\n\nfunction authorizeApi(req, url, config) {\n  if (config.tokenClientMap.size === 0) {\n    const error = new Error("Server auth not configured");\n    error.statusCode = 500;\n    throw error;\n  }\n  const token = extractToken(req, url);\n  const clientId = config.tokenClientMap.get(token);\n  if (!clientId) {\n    const error = new Error("Unauthorized");\n    error.statusCode = 401;\n    throw error;\n  }\n  const requested = requestedClientId(req);\n  if (requested && requested !== clientId) {\n    const error = new Error("Client ID mismatch");\n    error.statusCode = 403;\n    throw error;\n  }\n  return clientId;\n}`;
            const newAuth = `function extractToken(req, url) { return extractAuthToken(req, url); }\nfunction requestedClientId(req) { return requestedAuthClientId(req); }\nfunction authorizeApiContext(req, url, config) { return authorizeContext(req, url, config); }\nfunction authorizeApi(req, url, config) { return authorizeApiContext(req, url, config).clientId; }`;
            source = replaceOnce(source, oldAuth, newAuth, 'replace modular auth');
            source = replaceOnce(
              source,
              '  clientId,\n  maxBodyBytes,\n  startedAt,\n}) {\n  const route = jobRoute(pathname);',
              '  auth,\n  maxBodyBytes,\n  startedAt,\n}) {\n  const route = jobRoute(pathname);\n  const clientId = auth.clientId;',
              'job auth signature',
            );
            source = replaceOnce(
              source,
              '        idempotencyKey: idempotencyKey(req, body),',
              '        idempotencyKey: scopeIdempotencyKey(clientId, idempotencyKey(req, body)),',
              'scope job idempotency',
            );
            const oldList = `    if (route.action === "collection" && req.method === "GET") {\n      const jobs = await services.jobs.list({\n        limit: url.searchParams.get("limit") || 50,\n        status: url.searchParams.get("status") || "",\n      });\n      sendJson(res, 200, {\n        success: true,\n        jobs,\n        count: jobs.length,\n        jobRuntime: services.jobs.stats(),\n      });\n      return true;\n    }`;
            const newList = `    if (route.action === "collection" && req.method === "GET") {\n      const requestedLimit = Math.min(Math.max(Number(url.searchParams.get("limit") || 50), 1), 500);\n      const candidates = await services.jobs.list({\n        limit: auth.isAdmin ? requestedLimit : 500,\n        status: url.searchParams.get("status") || "",\n      });\n      const jobs = filterOwnedResources(candidates, auth).slice(0, requestedLimit);\n      sendJson(res, 200, {\n        success: true,\n        jobs,\n        count: jobs.length,\n        jobRuntime: services.jobs.stats(),\n      });\n      return true;\n    }`;
            source = replaceOnce(source, oldList, newList, 'job list ownership');
            source = source.replace('      const job = await services.jobs.get(route.jobId);\n      sendJson(res, 200, { success: true, job, ...job });', '      const job = assertResourceOwner(await services.jobs.get(route.jobId), auth, "Job");\n      sendJson(res, 200, { success: true, job, ...job });');
            source = source.replace('    if (route.action === "logs" && req.method === "GET") {\n      const value = await services.jobs.logs(route.jobId, {', '    if (route.action === "logs" && req.method === "GET") {\n      assertResourceOwner(await services.jobs.get(route.jobId), auth, "Job");\n      const value = await services.jobs.logs(route.jobId, {');
            source = source.replace('    if (route.action === "cancel" && req.method === "POST") {\n      const value = await services.jobs.cancel(route.jobId);', '    if (route.action === "cancel" && req.method === "POST") {\n      assertResourceOwner(await services.jobs.get(route.jobId), auth, "Job");\n      const value = await services.jobs.cancel(route.jobId);');
            source = source.replace('    ) {\n      const value = await services.jobs.remove(route.jobId);', '    ) {\n      assertResourceOwner(await services.jobs.get(route.jobId), auth, "Job");\n      const value = await services.jobs.remove(route.jobId);');
            source = source.replace('    if (route.action === "task" && req.method === "GET") {\n      const job = await services.jobs.get(route.jobId);', '    if (route.action === "task" && req.method === "GET") {\n      const job = assertResourceOwner(await services.jobs.get(route.jobId), auth, "Job");');
            source = replaceOnce(
              source,
              '      const clientId = authorizeApi(req, url, config);\n      const services = servicesFor(config);',
              '      const auth = authorizeApiContext(req, url, config);\n      const clientId = auth.clientId;\n      const services = servicesFor(config);',
              'gateway auth context',
            );
            source = replaceOnce(source, '        clientId,\n        maxBodyBytes,\n        startedAt,\n      })) return;\n\n      if (\n        pathname === "/api/batch"', '        auth,\n        maxBodyBytes,\n        startedAt,\n      })) return;\n\n      if (\n        pathname === "/api/batch"', 'pass job auth context');
            source = replaceOnce(source, '          maxBytes: body.maxBytes,\n        });', '          maxBytes: body.maxBytes,\n          maxScanBytes: body.maxScanBytes,\n        });', 'pass read scan limit');
            source = replaceOnce(source, '  authorizeApi,\n  createAgentPortGateway,', '  authorizeApi,\n  authorizeApiContext,\n  createAgentPortGateway,', 'export auth context');
            source = source.replace('            restartRecoverableJobs: true,', '            restartRecoverableJobs: true,\n            resourceOwnership: true,\n            clientScopedIdempotency: true,');
            write(file, source);
          }

          // Development Session ownership and lock config.
          {
            const file = 'daemon/development-gateway.cjs';
            let source = read(file);
            source = replaceOnce(
              source,
              "const { createDevelopmentSessionService } = require('../packages/daemon-core/development-session-service.cjs');",
              "const { createDevelopmentSessionService } = require('../packages/daemon-core/development-session-service.cjs');\nconst { assertResourceOwner, filterOwnedResources, normalizeAuthContext } = require('./auth-context.cjs');",
              'development auth import',
            );
            source = replaceOnce(
              source,
              'function createDevelopmentFrontServer({ baseOrigin, configLoader, authorizeApi, serviceFactory, maxBodyBytes = 10 * 1024 * 1024 } = {}) {',
              'function createDevelopmentFrontServer({ baseOrigin, configLoader, authorizeApi, authorizeContext, serviceFactory, maxBodyBytes = 10 * 1024 * 1024 } = {}) {',
              'development signature',
            );
            source = replaceOnce(source, "  if (!authorizeApi) throw new TypeError('authorizeApi is required');", "  if (!authorizeApi && !authorizeContext) throw new TypeError('authorizeApi or authorizeContext is required');", 'development auth requirement');
            source = replaceOnce(
              source,
              "        lockTimeoutMs: Number(config.values?.AGENTPORT_PROJECT_LOCK_TIMEOUT_MS || 15_000),\n        maxDiffBytes:",
              "        lockTimeoutMs: Number(config.values?.AGENTPORT_PROJECT_LOCK_TIMEOUT_MS || 15_000),\n        projectLockLeaseMs: Number(config.values?.AGENTPORT_PROJECT_LOCK_LEASE_MS || 300_000),\n        maxDiffBytes:",
              'development lock lease config',
            );
            source = replaceOnce(
              source,
              '      const clientId = authorizeApi(req, url, config);\n      const service = serviceFor(config);',
              '      const auth = normalizeAuthContext(authorizeContext ? authorizeContext(req, url, config) : authorizeApi(req, url, config));\n      const clientId = auth.clientId;\n      const service = serviceFor(config);',
              'development auth context',
            );
            source = replaceOnce(
              source,
              "        const [sessions, jobs] = await Promise.all([\n          service.list({ limit: url.searchParams.get('limit') || 100 }),",
              "        const [allSessions, jobs] = await Promise.all([\n          service.list({ limit: 500 }),",
              'overview all sessions',
            );
            source = replaceOnce(
              source,
              '        return sendJson(res, 200, {\n          success: true,\n          serverId: config.serverId,',
              '        const sessions = filterOwnedResources(allSessions, auth).slice(0, Math.min(Math.max(Number(url.searchParams.get(\'limit\') || 100), 1), 500));\n        return sendJson(res, 200, {\n          success: true,\n          serverId: config.serverId,',
              'overview filtered sessions',
            );
            const oldCollection = `      if (developmentRoute.action === 'collection' && req.method === 'GET') {\n        return sendJson(res, 200, {\n          success: true,\n          sessions: await service.list({ limit: url.searchParams.get('limit'), status: url.searchParams.get('status'), projectName: url.searchParams.get('projectName') }),\n          runtime: await service.stats(),\n        });\n      }`;
            const newCollection = `      if (developmentRoute.action === 'collection' && req.method === 'GET') {\n        const requestedLimit = Math.min(Math.max(Number(url.searchParams.get('limit') || 100), 1), 500);\n        const sessions = filterOwnedResources(await service.list({ limit: 500, status: url.searchParams.get('status'), projectName: url.searchParams.get('projectName') }), auth).slice(0, requestedLimit);\n        return sendJson(res, 200, { success: true, sessions, runtime: await service.stats() });\n      }`;
            source = replaceOnce(source, oldCollection, newCollection, 'session list ownership');
            source = replaceOnce(
              source,
              '      const session = await service.status(developmentRoute.sessionId);',
              '      const session = assertResourceOwner(await service.status(developmentRoute.sessionId), auth, "Session");',
              'session item ownership',
            );
            source = replaceOnce(
              source,
              "  const server = createDevelopmentFrontServer({ baseOrigin: `http://127.0.0.1:${'${internalPort}'}`, configLoader, authorizeApi: modular.authorizeApi });",
              "  const server = createDevelopmentFrontServer({ baseOrigin: `http://127.0.0.1:${'${internalPort}'}`, configLoader, authorizeApi: modular.authorizeApi, authorizeContext: modular.authorizeApiContext });",
              'start gateway auth context',
            );
            write(file, source);
          }

          // Ranged-read resource-limit coverage.
          {
            const file = 'test-daemon-gateway.cjs';
            let source = read(file);
            source = replaceOnce(
              source,
              "  await fs.writeFile(path.join(root, 'src', 'b.txt'), 'hello\\nworld\\n');",
              "  await fs.writeFile(path.join(root, 'src', 'b.txt'), 'hello\\nworld\\n');\n  await fs.writeFile(path.join(root, 'src', 'long.txt'), `${'x'.repeat(4096)}\\nsecond\\n`);",
              'range fixture',
            );
            source = replaceOnce(
              source,
              "    assert.equal(ranged.json.streamed, true);",
              "    assert.equal(ranged.json.streamed, true);\n    assert.equal(ranged.json.etagKind, 'metadata');\n    assert.equal(ranged.json.writeEtag, null);\n\n    const rangeTooLarge = await request(port, 'POST', '/api/fs/read', { path: 'src/long.txt', startLine: 1, endLine: 1, maxBytes: 16 }, auth);\n    assert.equal(rangeTooLarge.status, 413);\n    assert.equal(rangeTooLarge.json.code, 'ERANGE_BYTES');\n\n    const scanTooLarge = await request(port, 'POST', '/api/fs/read', { path: 'src/long.txt', startLine: 2, endLine: 2, maxBytes: 16, maxScanBytes: 64 }, auth);\n    assert.equal(scanTooLarge.status, 413);\n    assert.equal(scanTooLarge.json.code, 'ESCAN_LIMIT');",
              'range limit assertions',
            );
            write(file, source);
          }

          // Two-client Session adversarial coverage.
          {
            const file = 'test-development-gateway.cjs';
            let source = read(file);
            source = replaceOnce(
              source,
              "const { createDevelopmentFrontServer } = require('./daemon/development-gateway.cjs');",
              "const { createDevelopmentFrontServer } = require('./daemon/development-gateway.cjs');\nconst { authorizeContext } = require('./daemon/auth-context.cjs');",
              'dev test auth import',
            );
            source = replaceOnce(
              source,
              "function request(port, method, requestPath, body, headers = {}) {",
              "function request(port, method, requestPath, body, headers = {}) {",
              'request anchor',
            );
            source = replaceOnce(
              source,
              "        authorization: 'Bearer secret',\n        'x-mcp-client-id': 'client-a',",
              "        authorization: 'Bearer secret-a',\n        'x-mcp-client-id': 'client-a',",
              'default client a',
            );
            source = replaceOnce(
              source,
              "        tokenClientMap: new Map([['secret', 'client-a']]),",
              "        tokenClientMap: new Map([['secret-a', 'client-a'], ['secret-b', 'client-b']]),\n        adminTokens: new Set(['admin-secret']),",
              'dev test token map',
            );
            const oldAuthorize = `  const authorizeApi = (req, _url, config) => {\n    const token = String(req.headers.authorization || '').replace(/^Bearer\\s+/, '');\n    const clientId = config.tokenClientMap.get(token);\n    if (!clientId) { const error = new Error('Unauthorized'); error.statusCode = 401; throw error; }\n    return clientId;\n  };\n  const front = createDevelopmentFrontServer({ baseOrigin: \`http://127.0.0.1:${'${basePort}'}\`, configLoader, authorizeApi });`;
            const newAuthorize = `  const front = createDevelopmentFrontServer({ baseOrigin: \`http://127.0.0.1:${'${basePort}'}\`, configLoader, authorizeContext });`;
            source = replaceOnce(source, oldAuthorize, newAuthorize, 'dev test authorize context');
            source = replaceOnce(
              source,
              "    const session = created.data.session;\n    await fs.writeFile",
              "    const session = created.data.session;\n\n    const clientBHeaders = { authorization: 'Bearer secret-b', 'x-mcp-client-id': 'client-b' };\n    const adminHeaders = { authorization: 'Bearer admin-secret', 'x-mcp-client-id': undefined };\n    const hiddenList = await request(port, 'GET', '/api/dev/sessions', undefined, clientBHeaders);\n    assert.equal(hiddenList.data.sessions.length, 0);\n    for (const [method, suffix, payload] of [\n      ['GET', '', undefined], ['GET', '/diff', undefined], ['POST', '/run', { command: 'echo denied' }],\n      ['POST', '/commit', { message: 'denied' }], ['POST', '/rollback', { confirm: session.id }],\n      ['POST', '/merge', { confirm: session.id }], ['POST', '/cleanup', { confirm: session.id, force: true }],\n    ]) {\n      const denied = await request(port, method, `/api/dev/sessions/${'${session.id}'}${'${suffix}'}`, payload, clientBHeaders);\n      assert.equal(denied.status, 403);\n      assert.equal(denied.data.code, 'EOWNER');\n    }\n    const adminVisible = await request(port, 'GET', `/api/dev/sessions/${'${session.id}'}`, undefined, adminHeaders);\n    assert.equal(adminVisible.status, 200);\n\n    await fs.writeFile",
              'dev two-client assertions',
            );
            write(file, source);
          }

          // Two-client Job adversarial coverage and client-scoped idempotency.
          {
            const file = 'test-daemon-exec-jobs.cjs';
            let source = read(file);
            source = replaceOnce(
              source,
              '    tokenClientMap: new Map([["token", "client"]]),\n    adminTokens: new Set(),',
              '    tokenClientMap: new Map([["token-a", "client-a"], ["token-b", "client-b"]]),\n    adminTokens: new Set(["admin-token"]),',
              'job token map',
            );
            source = replaceOnce(
              source,
              '  const headers = { authorization: "Bearer token", "x-mcp-client-id": "client", "content-type": "application/json" };',
              '  const headers = { authorization: "Bearer token-a", "x-mcp-client-id": "client-a", "content-type": "application/json" };\n  const headersB = { authorization: "Bearer token-b", "x-mcp-client-id": "client-b", "content-type": "application/json" };\n  const adminHeaders = { authorization: "Bearer admin-token", "content-type": "application/json" };',
              'job auth headers',
            );
            source = replaceOnce(
              source,
              "    assert.match(task.stdout, /gateway-job/);",
              "    assert.match(task.stdout, /gateway-job/);\n\n    response = await fetch(`${'${base}'}/api/jobs`, { headers: headersB });\n    body = await response.json();\n    assert.equal(body.jobs.some((job) => job.id === jobId), false);\n    for (const [method, route] of [\n      ['GET', `/api/jobs/${'${jobId}'}`], ['GET', `/api/jobs/${'${jobId}'}/logs`], ['GET', `/api/task/${'${jobId}'}`],\n      ['POST', `/api/jobs/${'${jobId}'}/cancel`], ['POST', `/api/jobs/${'${jobId}'}/delete`],\n    ]) {\n      const denied = await fetch(`${'${base}'}${'${route}'}`, { method, headers: headersB });\n      const deniedBody = await denied.json();\n      assert.equal(denied.status, 403);\n      assert.equal(deniedBody.code, 'EOWNER');\n    }\n    const adminView = await fetch(`${'${base}'}/api/jobs/${'${jobId}'}`, { headers: adminHeaders });\n    assert.equal(adminView.status, 200);\n\n    response = await fetch(`${'${base}'}/api/exec/async`, { method: 'POST', headers: { ...headersB, 'idempotency-key': 'gateway-job' }, body: JSON.stringify({ command: jobCommand, cwd: root }) });\n    body = await response.json();\n    assert.equal(body.reused, false);\n    assert.notEqual(body.jobId, jobId);",
              'job two-client assertions',
            );
            write(file, source);
          }

          // Long-running lock ownership test.
          write('test-project-lock.cjs', `const assert = require('node:assert/strict');\nconst fs = require('node:fs/promises');\nconst os = require('node:os');\nconst path = require('node:path');\nconst { createProjectLockManager } = require('./packages/daemon-core/project-lock.cjs');\n\nfunction sleep(ms) { return new Promise((resolve) => setTimeout(resolve, ms)); }\n\nasync function main() {\n  const root = await fs.mkdtemp(path.join(os.tmpdir(), 'agentport-project-lock-'));\n  const locksDir = path.join(root, 'locks');\n  const project = path.join(root, 'repo');\n  await fs.mkdir(project);\n  const manager = createProjectLockManager({ locksDir, lockTimeoutMs: 200, lockLeaseMs: 1000 });\n  try {\n    let entered = false;\n    const first = manager.withLock(project, async () => { entered = true; await sleep(1400); return 'first'; });\n    while (!entered) await sleep(10);\n    await sleep(1100);\n    await assert.rejects(() => manager.withLock(project, async () => 'stolen'), (error) => error?.code === 'EPROJECT_LOCKED');\n    assert.equal(await first, 'first');\n    assert.equal(await manager.withLock(project, async () => 'after-release'), 'after-release');\n    const lockPath = manager.lockPathFor(project);\n    await fs.writeFile(lockPath, JSON.stringify({ ownerId: 'dead', pid: 99999999, expiresAt: new Date(Date.now() + 60_000).toISOString() }));\n    assert.equal(await manager.withLock(project, async () => 'recovered'), 'recovered');\n  } finally {\n    await fs.rm(root, { recursive: true, force: true });\n  }\n  console.log('PASS live project locks cannot expire or be stolen, and dead owners are recoverable');\n}\n\nmain().catch((error) => { console.error(error.stack || error.message); process.exit(1); });\n`);

          // Scripts and CI.
          {
            const file = 'package.json';
            const pkg = JSON.parse(read(file));
            pkg.scripts['test:sessions'] = 'node test-project-lock.cjs && node test-development-session-service.cjs && node test-development-gateway.cjs';
            write(file, `${JSON.stringify(pkg, null, 2)}\n`);
          }
          {
            const file = '.github/workflows/ci.yml';
            let source = read(file);
            source = replaceOnce(source, '      - run: node test-development-session-service.cjs\n      - run: node test-development-gateway.cjs', '      - run: node test-project-lock.cjs\n      - run: node test-development-session-service.cjs\n      - run: node test-development-gateway.cjs', 'ci architecture project lock');
            source = replaceOnce(source, '      - run: node test-development-session-service.cjs\n      - run: node test-development-gateway.cjs\n      - run: node test-client-mcp-v3.cjs', '      - run: node test-project-lock.cjs\n      - run: node test-development-session-service.cjs\n      - run: node test-development-gateway.cjs\n      - run: node test-client-mcp-v3.cjs', 'ci durable project lock');
            write(file, source);
          }

          // Current release documentation.
          {
            const file = 'docs/PHASE5_DEVELOPMENT_SESSIONS.md';
            let source = read(file);
