name: Refresh package locks

on:
  push:
    branches: ["agent/refactor-dual-end-architecture"]

permissions:
  contents: write

jobs:
  refresh:
    if: contains(github.event.head_commit.message, '[refresh-lockfiles]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/refactor-dual-end-architecture
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Regenerate lock files
        run: |
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          npm --prefix server install --package-lock-only --ignore-scripts --no-audit --no-fund
      - name: Commit lock files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json server/package-lock.json
          if git diff --cached --quiet; then
            echo "Lock files already current"
            exit 0
          fi
          git commit -m "chore: refresh package lock files"
          git push origin HEAD:agent/refactor-dual-end-architecture
