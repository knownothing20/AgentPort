name: Repair blocker fix workflow once

on:
  push:
    branches: ["agent/refactor-dual-end-architecture"]

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/refactor-dual-end-architecture
      - name: Repair verified patch task
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const file = '.github/workflows/apply-release-blocker-fixes-once.yml';
          let source = fs.readFileSync(file, 'utf8');

          for (const [before, after] of [
            ["${'${internalPort}'}", "${internalPort}"],
            ["${'${session.id}'}", "${session.id}"],
            ["${'${suffix}'}", "${suffix}"],
            ["${'${base}'}", "${base}"],
            ["${'${route}'}", "${route}"],
            ["${'${jobId}'}", "${jobId}"],
            ["${'${section}'}", "${section}"],
            ["const adminHeaders = { authorization: 'Bearer admin-secret', 'x-mcp-client-id': undefined };", "const adminHeaders = { authorization: 'Bearer admin-secret' };"],
          ]) source = source.split(before).join(after);

          const ciOld = "            source = replaceOnce(source, '      - run: node test-development-session-service.cjs\\n      - run: node test-development-gateway.cjs', '      - run: node test-project-lock.cjs\\n      - run: node test-development-session-service.cjs\\n      - run: node test-development-gateway.cjs', 'ci architecture project lock');\n            source = replaceOnce(source, '      - run: node test-development-session-service.cjs\\n      - run: node test-development-gateway.cjs\\n      - run: node test-client-mcp-v3.cjs', '      - run: node test-project-lock.cjs\\n      - run: node test-development-session-service.cjs\\n      - run: node test-development-gateway.cjs\\n      - run: node test-client-mcp-v3.cjs', 'ci durable project lock');";
          const ciNew = "            const sessionPair = '      - run: node test-development-session-service.cjs\\n      - run: node test-development-gateway.cjs';\n            if (source.split(sessionPair).length - 1 !== 2) throw new Error('ci project lock: expected two session pairs');\n            source = source.replaceAll(sessionPair, '      - run: node test-project-lock.cjs\\n' + sessionPair);";
          if (!source.includes(ciOld)) throw new Error('Expected CI insertion block not found');
          source = source.replace(ciOld, ciNew);

          const fixtureAnchor = "              'range fixture',\n            );\n            source = replaceOnce(\n              source,\n              \"    assert.equal(ranged.json.streamed, true);\"";
          const fixtureReplacement = "              'range fixture',\n            );\n            source = replaceOnce(source, \"    assert.deepEqual(glob.files.sort(), ['src/a.js', 'src/b.txt']);\", \"    assert.deepEqual(glob.files.sort(), ['src/a.js', 'src/b.txt', 'src/long.txt']);\", 'range glob expected');\n            source = replaceOnce(\n              source,\n              \"    assert.equal(ranged.json.streamed, true);\"";
          if (!source.includes(fixtureAnchor)) throw new Error('Expected range fixture anchor not found');
          source = source.replace(fixtureAnchor, fixtureReplacement);

          source = source.replace(
            "git rm -f .github/workflows/apply-release-blocker-fixes-once.yml .github/workflows/export-source-once.yml",
            "git rm -f .github/workflows/apply-release-blocker-fixes-once.yml .github/workflows/export-source-once.yml .source-export-run-id BLOCKER_FIX_TRIGGER",
          );

          fs.writeFileSync(file, source);
          NODE
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/fix-blocker-workflow-once.yml .github/workflows/export-source-once.yml
          git add .github/workflows/apply-release-blocker-fixes-once.yml
          git commit -m "chore: repair verified blocker fix task"
          git push origin HEAD:agent/refactor-dual-end-architecture
