name: Patch Job cwd once

on:
  push:
    branches: ["agent/refactor-dual-end-architecture"]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/refactor-dual-end-architecture
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Remove duplicate cwd resolution
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const file = 'packages/daemon-core/job-service.cjs';
          const source = fs.readFileSync(file, 'utf8');
          const before = '  async function createAndStart(input) {\n    policy.validateCommand(input.command);\n    const cwd = await resolveCwd(input.cwd);';
          const after = '  async function createAndStart(input) {\n    policy.validateCommand(input.command);\n    const cwd = input.cwd;';
          if (!source.includes(before)) throw new Error('Expected createAndStart cwd block not found');
          const updated = source.replace(before, after);
          if ((updated.match(/const cwd = input\.cwd;/g) || []).length !== 1) throw new Error('Unexpected patched cwd count');
          fs.writeFileSync(file, updated);
          NODE
          node --check packages/daemon-core/job-service.cjs
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/daemon-core/job-service.cjs
          git diff --cached --quiet && exit 0
          git commit -m "fix: avoid duplicate Job cwd resolution"
          git push origin HEAD:agent/refactor-dual-end-architecture
