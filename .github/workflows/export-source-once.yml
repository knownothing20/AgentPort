name: Export source once

on:
  push:
    branches: ["agent/refactor-dual-end-architecture"]

permissions:
  contents: read

jobs:
  export:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/refactor-dual-end-architecture
      - uses: actions/upload-artifact@v4
        with:
          name: agentport-source-${{ github.sha }}
          path: |
            .
            !.git
            !node_modules
            !server/node_modules
          include-hidden-files: true
          retention-days: 1
