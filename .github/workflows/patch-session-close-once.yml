name: Patch session stream close once

on:
  push:
    branches: ["agent/refactor-dual-end-architecture"]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/refactor-dual-end-architecture
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Patch session process completion and stress coverage
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const implementationPath = 'packages/daemon-core/development-session-service.cjs';
          let implementation = fs.readFileSync(implementationPath, 'utf8');
          const exitListener = "    child.once('exit', (code, signal) => {";
          const closeListener = "    child.once('close', (code, signal) => {";
          if ((implementation.match(/child\.once\('exit', \(code, signal\) => \{/g) || []).length !== 1) {
            throw new Error('Expected exactly one session child exit listener');
          }
          implementation = implementation.replace(exitListener, closeListener);
          fs.writeFileSync(implementationPath, implementation);

          const testPath = 'test-development-session-service.cjs';
          let test = fs.readFileSync(testPath, 'utf8');
          const oldProbe = [
            "    const diff = await service.diff(session.id);",
            "    assert.match(normalizeEol(diff.diff), /changed/);",
          ].join('\n');
          const newProbe = [
            "    for (let iteration = 0; iteration < 50; iteration += 1) {",
            "      const diff = await service.diff(session.id);",
            "      assert.match(normalizeEol(diff.diff), /changed/, `fast diff iteration ${iteration + 1} returned incomplete stdout`);",
            "      assert.match(normalizeEol(diff.status), /README\\.md/, `fast status iteration ${iteration + 1} returned incomplete stdout`);",
            "    }",
          ].join('\n');
          if (!test.includes(oldProbe)) throw new Error('Expected session diff assertion block not found');
          test = test.replace(oldProbe, newProbe);
          test = test.replace(
            "PASS development session Worktree, diff, commit, merge, confirmation, and cleanup",
            "PASS development session Worktree, 50 fast diff/status reads, commit, merge, confirmation, and cleanup",
          );
          fs.writeFileSync(testPath, test);
          NODE
          node --check packages/daemon-core/development-session-service.cjs
          node --check test-development-session-service.cjs
          node test-development-session-service.cjs
      - name: Commit verified fix and remove one-time workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/patch-session-close-once.yml
          git add packages/daemon-core/development-session-service.cjs test-development-session-service.cjs
          git commit -m "fix: wait for session process streams to close"
          git push origin HEAD:agent/refactor-dual-end-architecture
